<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloxup</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111111;
        background: #ffffff;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      .home {
        min-height: 100svh;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: 24px;
        background: #ffffff;
      }

      .kinetic-title {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        color: #111111;
        font-size: clamp(3rem, 10vw, 8.5rem);
        font-weight: 760;
        line-height: 0.95;
        letter-spacing: -0.045em;
        user-select: none;
        touch-action: none;
        animation: title-in 720ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .letter,
      .space {
        display: inline-block;
        transition:
          transform 260ms cubic-bezier(0.16, 1, 0.3, 1),
          opacity 180ms ease;
        will-change: transform;
      }

      .letter {
        cursor: grab;
        padding: 0.04em 0.01em 0.12em;
      }

      .letter:active {
        cursor: grabbing;
      }

      .letter[data-active="true"] {
        opacity: 0.92;
      }

      .space {
        width: 0.24em;
        pointer-events: none;
      }

      @keyframes title-in {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 620px) {
        .kinetic-title {
          font-size: clamp(2.7rem, 13vw, 4.5rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .kinetic-title,
        .letter,
        .space {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="home">
        <h1 class="kinetic-title" aria-label="made by Sparkle">
          <span class="letter" data-index="0">m</span>
          <span class="letter" data-index="1">a</span>
          <span class="letter" data-index="2">d</span>
          <span class="letter" data-index="3">e</span>
          <span class="space" data-index="4">&nbsp;</span>
          <span class="letter" data-index="5">b</span>
          <span class="letter" data-index="6">y</span>
          <span class="space" data-index="7">&nbsp;</span>
          <span class="letter" data-index="8">S</span>
          <span class="letter" data-index="9">p</span>
          <span class="letter" data-index="10">a</span>
          <span class="letter" data-index="11">r</span>
          <span class="letter" data-index="12">k</span>
          <span class="letter" data-index="13">l</span>
          <span class="letter" data-index="14">e</span>
        </h1>
      </main>
    </div>
    <script>
      const title = document.querySelector(".kinetic-title")
      const letters = [...document.querySelectorAll(".letter")]
      const positions = new Map()
      let activeIndex = null
      let dragging = null

      function render() {
        letters.forEach((letter) => {
          const index = Number(letter.dataset.index)
          const stored = positions.get(index) || { x: 0, y: 0 }
          const distance =
            activeIndex === null ? Number.POSITIVE_INFINITY : Math.abs(activeIndex - index)
          const lift = distance === 0 ? -24 : distance === 1 ? -12 : 0
          const rotate = distance === 0 ? -4 : distance === 1 ? 3 : 0

          letter.dataset.active = distance <= 1
          letter.style.transform = `translate3d(${stored.x}px, ${
            stored.y + lift
          }px, 0) rotate(${rotate}deg)`
        })
      }

      letters.forEach((letter) => {
        letter.addEventListener("pointerenter", () => {
          activeIndex = Number(letter.dataset.index)
          render()
        })

        letter.addEventListener("pointerdown", (event) => {
          const index = Number(letter.dataset.index)
          const origin = positions.get(index) || { x: 0, y: 0 }

          letter.setPointerCapture(event.pointerId)
          dragging = {
            index,
            startX: event.clientX,
            startY: event.clientY,
            origin,
          }
        })
      })

      title.addEventListener("pointermove", (event) => {
        if (!dragging) {
          return
        }

        positions.set(dragging.index, {
          x: dragging.origin.x + event.clientX - dragging.startX,
          y: dragging.origin.y + event.clientY - dragging.startY,
        })
        render()
      })

      title.addEventListener("pointerup", () => {
        dragging = null
      })

      title.addEventListener("pointercancel", () => {
        dragging = null
      })

      title.addEventListener("pointerleave", () => {
        activeIndex = null
        dragging = null
        render()
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
