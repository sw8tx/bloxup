<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloxup</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #111111;
        background: #ffffff;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      .topbar {
        position: fixed;
        z-index: 10;
        top: 0;
        left: 0;
        right: 0;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 22px;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid rgba(17, 17, 17, 0.08);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        color: #111111;
        font-size: 1.05rem;
        font-weight: 780;
        letter-spacing: 0;
        text-decoration: none;
      }

      .rocket-link {
        position: relative;
        width: 70px;
        height: 56px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .rocket-link::after {
        position: absolute;
        right: 36px;
        bottom: 7px;
        width: 28px;
        height: 10px;
        content: "";
        background: linear-gradient(90deg, rgba(38, 245, 82, 0), rgba(38, 245, 82, 0.45));
        border-radius: 999px;
        filter: blur(3px);
        opacity: 0;
        transform: rotate(-35deg);
        animation: rocket-trail 2800ms ease-in-out infinite;
      }

      .brand-logo {
        width: 52px;
        height: 52px;
        display: block;
        object-fit: contain;
        transform-origin: 46% 56%;
        animation: rocket-launch 2800ms ease-in-out infinite;
      }

      .brand-name {
        white-space: nowrap;
      }

      .home {
        min-height: 100svh;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: 96px 24px 24px;
        background: linear-gradient(180deg, #ffffff 0%, #f7f8f5 100%);
        perspective: 900px;
      }

      .kinetic-title {
        --tilt-x: 15deg;
        --tilt-y: -10deg;
        --lift: 0px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        color: #21e638;
        font-size: clamp(3.4rem, 11vw, 10rem);
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: 0;
        user-select: none;
        transform: translateY(calc(var(--lift) * -1)) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) rotateZ(-1deg);
        transform-style: preserve-3d;
        transition: transform 140ms ease-out;
        animation: title-in 620ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .letter {
        display: inline-block;
        min-width: 0.46em;
        padding: 0.02em 0;
        color: #29f141;
        text-align: center;
        text-shadow:
          1px 1px 0 #0fb82a,
          2px 2px 0 #0b9924,
          3px 3px 0 #087c1c,
          4px 4px 0 #065f16,
          5px 5px 0 #044810,
          6px 6px 0 #032f0a,
          7px 8px 0 #021c06,
          14px 18px 18px rgba(0, 0, 0, 0.28);
        -webkit-text-stroke: 2px #071408;
        transition:
          transform 180ms ease,
          color 180ms ease;
        transform: translateZ(calc(var(--index) * 0.4px));
        will-change: transform;
      }

      .letter:hover {
        color: #72ff63;
        transform: translate3d(-2px, -6px, 22px);
      }

      .dot {
        min-width: 0.3em;
      }

      @keyframes title-in {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes rocket-launch {
        0% {
          opacity: 1;
          transform: translate3d(0, 0, 0) rotate(-12deg) scale(1);
        }

        7% {
          transform: translate3d(-2px, 1px, 0) rotate(-18deg) scale(1.02);
        }

        14% {
          transform: translate3d(3px, -1px, 0) rotate(-6deg) scale(1.02);
        }

        21% {
          transform: translate3d(-1px, 2px, 0) rotate(-15deg) scale(1.03);
        }

        28% {
          opacity: 1;
          transform: translate3d(0, 0, 0) rotate(-12deg) scale(1.04);
        }

        54% {
          opacity: 0;
          transform: translate3d(86px, -118px, 0) rotate(28deg) scale(0.82);
        }

        72% {
          opacity: 0;
          transform: translate3d(-30px, 34px, 0) rotate(-18deg) scale(0.9);
        }

        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0) rotate(-12deg) scale(1);
        }
      }

      @keyframes rocket-trail {
        0%,
        18%,
        62%,
        100% {
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(-35deg) scaleX(0.4);
        }

        30% {
          opacity: 0.85;
          transform: translate3d(-5px, 5px, 0) rotate(-35deg) scaleX(1);
        }

        46% {
          opacity: 0.18;
          transform: translate3d(-30px, 25px, 0) rotate(-35deg) scaleX(2.1);
        }
      }

      @media (max-width: 620px) {
        .topbar {
          height: 62px;
          padding: 9px 14px;
        }

        .rocket-link {
          width: 58px;
          height: 48px;
        }

        .brand-logo {
          width: 46px;
          height: 46px;
        }

        .brand-name {
          font-size: 0.98rem;
        }

        .home {
          padding-top: 82px;
          padding-left: 12px;
          padding-right: 12px;
        }

        .kinetic-title {
          --tilt-x: 13deg;
          --tilt-y: -5deg;
          font-size: clamp(1.9rem, 8.8vw, 2.9rem);
        }

        .letter {
          min-width: 0.43em;
          -webkit-text-stroke-width: 1.4px;
          text-shadow:
            1px 1px 0 #0fb82a,
            2px 2px 0 #0b9924,
            3px 3px 0 #087c1c,
            4px 4px 0 #065f16,
            8px 11px 14px rgba(0, 0, 0, 0.26);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .kinetic-title,
        .brand-logo,
        .letter {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar" aria-label="Bloxup navigation">
      <a class="brand" href="./" aria-label="bloxup.shop home">
        <span class="brand-name">bloxup.shop</span>
      </a>
      <a class="rocket-link" href="./" aria-label="bloxup.shop home">
        <img class="brand-logo" src="logo.png" alt="" />
      </a>
    </header>
    <main class="home">
      <h1 class="kinetic-title" aria-label="bloxup.shop">
        <span class="letter" style="--index: 0" aria-hidden="true">b</span>
        <span class="letter" style="--index: 1" aria-hidden="true">l</span>
        <span class="letter" style="--index: 2" aria-hidden="true">o</span>
        <span class="letter" style="--index: 3" aria-hidden="true">x</span>
        <span class="letter" style="--index: 4" aria-hidden="true">u</span>
        <span class="letter" style="--index: 5" aria-hidden="true">p</span>
        <span class="letter dot" style="--index: 6" aria-hidden="true">.</span>
        <span class="letter" style="--index: 7" aria-hidden="true">s</span>
        <span class="letter" style="--index: 8" aria-hidden="true">h</span>
        <span class="letter" style="--index: 9" aria-hidden="true">o</span>
        <span class="letter" style="--index: 10" aria-hidden="true">p</span>
      </h1>
    </main>
    <script>
      const title = document.querySelector(".kinetic-title")

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value))
      }

      function moveTitle(event) {
        const rect = title.getBoundingClientRect()
        const centerX = rect.left + rect.width / 2
        const centerY = rect.top + rect.height / 2
        const distanceX = (event.clientX - centerX) / rect.width
        const distanceY = (event.clientY - centerY) / rect.height

        title.style.setProperty("--tilt-x", `${clamp(distanceY * -18, -12, 12)}deg`)
        title.style.setProperty("--tilt-y", `${clamp(distanceX * 24, -18, 18)}deg`)
        title.style.setProperty("--lift", "18px")
      }

      function resetTitle() {
        title.style.removeProperty("--tilt-x")
        title.style.removeProperty("--tilt-y")
        title.style.removeProperty("--lift")
      }

      window.addEventListener("pointermove", moveTitle)
      window.addEventListener("pointerleave", resetTitle)
    </script>
  </body>
</html>
