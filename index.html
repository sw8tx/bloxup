<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloxup</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111111;
        background: #ffffff;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      .home {
        min-height: 100svh;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: 24px;
        background: #ffffff;
      }

      .split-title {
        --spread: clamp(10px, 1.65vw, 28px);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.23em;
        margin: 0;
        color: #111111;
        font-size: clamp(3rem, 10vw, 8.5rem);
        font-weight: 760;
        line-height: 0.95;
        letter-spacing: -0.045em;
        cursor: default;
        user-select: none;
        animation: title-in 720ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .word {
        display: inline-flex;
        position: relative;
        padding-block: 0.08em;
      }

      .letter {
        display: inline-block;
        transform: translate3d(0, 0, 0) rotate(0deg);
        transition:
          transform 520ms cubic-bezier(0.16, 1, 0.3, 1),
          opacity 260ms ease;
        transition-delay: calc(var(--i) * 18ms);
        will-change: transform;
      }

      .word:hover .letter {
        opacity: 0.94;
      }

      .word:hover .letter:nth-child(1) {
        transform: translate3d(calc(var(--spread) * -1), -18px, 0)
          rotate(-8deg);
      }

      .word:hover .letter:nth-child(2) {
        transform: translate3d(calc(var(--spread) * -0.42), 16px, 0)
          rotate(7deg);
      }

      .word:hover .letter:nth-child(3) {
        transform: translate3d(calc(var(--spread) * 0.22), -22px, 0)
          rotate(-5deg);
      }

      .word:hover .letter:nth-child(4) {
        transform: translate3d(calc(var(--spread) * 0.62), 20px, 0)
          rotate(5deg);
      }

      .word:hover .letter:nth-child(5) {
        transform: translate3d(calc(var(--spread) * 0.96), -16px, 0)
          rotate(-6deg);
      }

      .word:hover .letter:nth-child(6) {
        transform: translate3d(calc(var(--spread) * 1.26), 17px, 0)
          rotate(6deg);
      }

      .word:hover .letter:nth-child(7) {
        transform: translate3d(calc(var(--spread) * 1.48), -12px, 0)
          rotate(-4deg);
      }

      @keyframes title-in {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 620px) {
        .split-title {
          --spread: 9px;
          gap: 0.18em;
          font-size: clamp(2.7rem, 13vw, 4.5rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .split-title,
        .letter {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="home">
        <h1 class="split-title" aria-label="made by Sparkle">
          <span class="word" aria-hidden="true">
            <span class="letter" style="--i: 0">m</span>
            <span class="letter" style="--i: 1">a</span>
            <span class="letter" style="--i: 2">d</span>
            <span class="letter" style="--i: 3">e</span>
          </span>
          <span class="word" aria-hidden="true">
            <span class="letter" style="--i: 0">b</span>
            <span class="letter" style="--i: 1">y</span>
          </span>
          <span class="word" aria-hidden="true">
            <span class="letter" style="--i: 0">S</span>
            <span class="letter" style="--i: 1">p</span>
            <span class="letter" style="--i: 2">a</span>
            <span class="letter" style="--i: 3">r</span>
            <span class="letter" style="--i: 4">k</span>
            <span class="letter" style="--i: 5">l</span>
            <span class="letter" style="--i: 6">e</span>
          </span>
        </h1>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
